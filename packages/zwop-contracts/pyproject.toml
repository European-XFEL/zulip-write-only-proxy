[project]
name = "zwop-contracts"
version = "0.1.0"
description = "Shared API contracts for ZWOP services"
requires-python = ">=3.13"
dependencies = [
    "pydantic>=2.12.5",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.sdist]
include = ["src/zwop_contracts"]

[tool.hatch.build.targets.wheel]
include = ["src/zwop_contracts"]

[tool.hatch.build.targets.wheel.sources]
"src/zwop_contracts" = "zwop_contracts"
