[project]
name = "zwop-token-writer"
version = "0.1.0"
description = "mTLS-protected token writer microservice"
requires-python = ">=3.13"
dependencies = [
    "fastapi>=0.128.0",
    "orjson>=3.11.7",
    "pydantic-settings>=2.12.0",
    "uvicorn>=0.40.0",
    "zwop-contracts",
]

[tool.uv.sources]
zwop-contracts = { workspace = true }

[project.scripts]
zwop-token-writer = "zwop_token_writer.main:run"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.sdist]
include = ["src/zwop_token_writer"]

[tool.hatch.build.targets.wheel]
include = ["src/zwop_token_writer"]

[tool.hatch.build.targets.wheel.sources]
"src/zwop_token_writer" = "zwop_token_writer"
