[project]
name = "zwop-tws"
dynamic = ["version"]
description = "mTLS-protected token writer microservice"
requires-python = ">=3.13"
dependencies = [
    "fastapi>=0.128.0",
    "orjson>=3.11.7",
    "pydantic-settings>=2.12.0",
    "uvicorn>=0.40.0",
]

[project.scripts]
zwop-tws = "zwop_tws.main:run"

[tool.hatch.version]
source = "vcs"
raw-options = { root = "../.." }
fallback-version = "0.0.0.dev0"

[tool.hatch.build.hooks.vcs]
version-file = "../_version.py"

[build-system]
requires = ["hatchling", "hatch-vcs"]
build-backend = "hatchling.build"
