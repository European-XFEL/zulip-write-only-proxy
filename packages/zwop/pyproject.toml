[project]
name = "zwop"
dynamic = ["version"]
authors = [
    { name = "Robert Rosca", email = "32569096+RobertRosca@users.noreply.github.com" },
]
requires-python = ">=3.13"
dependencies = [
    "authlib>=1.6.6",
    "fastapi>=0.128.0",
    "httpx>=0.28.1",
    "itsdangerous>=2.2.0",
    "jinja2>=3.1.6",
    "orjson>=3.11.7",
    "pydantic-settings>=2.12.0",
    "pydantic[email]>=2.12.5",
    "python-multipart>=0.0.22",
    "structlog>=25.5.0",
    "uvicorn>=0.40.0",
    "zulip>=0.9.1",
    "zwop-tws",
]

[tool.uv.sources]
zwop-tws = { workspace = true }

[project.scripts]
zwop = "zwop.main:main"

[tool.hatch.version]
source = "vcs"
raw-options = { root = "../.." }
fallback-version = "0.0.0.dev0"

[tool.hatch.build.hooks.vcs]
version-file = "./src/zwop/_version.py"

[tool.hatch.build.targets.sdist.hooks.custom]

[tool.hatch.build.targets.sdist]
artifacts = ["src/zwop/frontend/static/"]

[build-system]
requires = ["hatchling", "hatch-vcs"]
build-backend = "hatchling.build"
