[project]
name = "zwop-service"
version = "0.1.0"
description = "Zulip Write Only Proxy main API service"
readme = "../../README.md"
requires-python = ">=3.13"
dependencies = [
    "authlib>=1.6.6",
    "fastapi>=0.128.0",
    "httpx>=0.28.1",
    "itsdangerous>=2.2.0",
    "jinja2>=3.1.6",
    "orjson>=3.11.7",
    "pydantic-settings>=2.12.0",
    "pydantic[email]>=2.12.5",
    "python-multipart>=0.0.22",
    "structlog>=25.5.0",
    "uvicorn>=0.40.0",
    "zulip>=0.9.1",
    "zwop-contracts",
]

[tool.uv.sources]
zwop-contracts = { workspace = true }

[tool.hatch.build.targets.sdist]
include = ["src/zwop"]

[tool.hatch.build.targets.wheel]
include = ["src/zwop"]

[tool.hatch.build.targets.wheel.sources]
"src/zwop" = "zwop"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"
