output-format = "grouped"

preview = true

target-version = "py313"

src = ["packages"]

[lint]
select = [
    "ASYNC", # flake8-async
    "ARG",   # flake8-arg
    "B",     # flake8-bugbear
    "C4",    # flake8-comprehensions
    "C90",   # mccabe complexity
    "DTZ",   # flake8-datetime
    "E",     # pycodestyle
    "EM",    # flake8-errmsg
    "F",     # flake8
    "FAST",  # fastapi
    "FURB",  # refurb
    "G",     # flake8-logging-format
    "I",     # isort
    "ICN",   # flake8-import-conventions
    "ISC",   # flake8-implicit-str-concat
    "LOG",   # flake8-logging
    "N",     # pep8 naming
    "NPY",   # numpy
    "PD",    # pandas
    "PERF",  # perflint
    "PGH",   # pygrep-hooks
    "PIE",   # flake8-pie
    "PL",    # pylint
    "PT",    # flake8-pytest-style
    "PTH",   # flake8-use-pathlib
    "Q",     # flake8-quotes
    "RET",   # flake8-return
    "RSE",   # flake8-raise
    "RUF",   # ruff
    "S",     # flake8-bandit
    "SIM",   # flake8-simplify
    "TC",    # flake8-type-checking (renamed from TCH in v0.8.0)
    "TRY",   # tryceratops
    "UP",    # pyupgrade
    "W",     # pycodestyle
    "YTT",   # flake8-2020
]
extend-ignore = ["B018", "B019", "RUF067"]

[lint.per-file-ignores]
"tests/**/*.py" = ["S101"]

[lint.isort]
known-local-folder = ["src", "zwop", "zwop_tws"]
