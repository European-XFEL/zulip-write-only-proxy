[tool.uv.workspace]
members = [
    "packages/zwop",
    "packages/token-writer",
]

[tool.uv.sources]
zwop = { workspace = true }
zwop-tws = { workspace = true }

[dependency-groups]
dev = [
    "poethepoet>=0.37.0",
    "pytest>=9.0.2",
    "pytest-asyncio>=1.3.0",
    "pytest-cov>=7.0.0",
    "ruff>=0.13.0",
    "vcrpy>=8.1.1",
    "zwop",
    "zwop-tws",
]

[tool.poe.tasks]
test = "uv run pytest ./tests --cov-report term --cov-report xml --cov zwop --cov zwop_tws"
lint = "uv run ruff check --fix"
format = "uv run ruff format"
